workflows:
  react-native-android:
    name: React Native Android Build

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk